<!DOCTYPE html>
<html>
<head>
  <title>Lab 6</title>
  <style>
    .layout-flex {
      display: flex;
      background-color: DodgerBlue;
    }

    .item {
      background-color: Orange;
      margin: 15px;
      padding: 20px;
      font-size: 25px;
    }
  </style>
</head>
<body>

  <h1>Create a Flex Container</h1>

  <div id="container" class="layout-flex">
    <div id="item-1" class="item">Item 1</div>
    <div id="item-2" class="item">Item 2</div>
    <div id="item-3" class="item">Item 3</div>
    <div id="item-4" class="item">Item 4</div>
    <div id="item-5" class="item">Item 5</div>
  </div>

  <button id="button-flex" disabled>Flexbox layout</button>
  <button id="button-grid">Grid layout</button>

</body>
</html>
